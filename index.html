<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <title>NumberFarmingSimulator</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      /* nové sci-fi tech pozadie */
      background-image: url("https://media.istockphoto.com/id/2160041418/vector/abstract-background-with-technology-circuit-board-texture-artificial-intelligence-electronic.jpg?s=170667a&w=0&k=20&c=fPalJnkiYxMTFvHtU0Zw94lvshtJOhXUNrluVcVqhqQ=");
      background-size: cover;
      background-position: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* tmavý overlay aby text vynikol */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 10, 25, 0.65);
      z-index: 0;
    }

    .title {
      position: absolute;
      top: 70px;
      text-align: center;
      font-size: 70px;
      font-family: "Showcard Gothic", cursive;
      font-weight: bold;
      z-index: 1;

      background: linear-gradient(90deg, #00e5ff, #008cff, #00ffcc, #00b7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      text-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
      letter-spacing: 2px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
      z-index: 1;
    }

    .btn {
      width: 240px;
      padding: 15px;
      font-size: 20px;
      border: 2px solid rgba(0, 229, 255, 0.5);
      border-radius: 12px;
      cursor: pointer;
      transition: 0.25s;
      color: white;
      font-weight: bold;
      background: rgba(0, 30, 60, 0.4);
      backdrop-filter: blur(6px);
      box-shadow: 0 0 12px rgba(0, 229, 255, 0.2);
    }

    .btn:hover {
      transform: scale(1.06);
      box-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
      border-color: #00e5ff;
    }

    .play {
      background: linear-gradient(90deg, #00e5ff, #008cff);
      color: #001018;
      border: none;
      box-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
    }

    .play:hover {
      box-shadow: 0 0 35px rgba(0, 229, 255, 0.9);
    }

    .soon {
      opacity: 0.5;
      cursor: not-allowed;
      background: rgba(80, 80, 80, 0.4);
      border: 2px solid rgba(150, 150, 150, 0.3);
    }

    .credit {
      position: absolute;
      bottom: 10px;
      right: 15px;
      font-size: 12px;
      color: #00e5ff;
      opacity: 0.8;
      z-index: 1;
    }
  </style>
</head>

<body>

  <div class="title">
    Number Farming Simulator
  </div>

  <div class="menu">

    <a href="klikanie.html">
      <button class="btn play">▶ PLAY</button>
    </a>

    <button class="btn soon">COMING SOON</button>
    <button class="btn soon">COMING SOON</button>

  </div>

  <div class="credit">
    by: Bigonix335
  </div>

</body>
</html>
